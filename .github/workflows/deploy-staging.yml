name: Deploy Staging

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy Staging Dry Run
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - toolhub
      - macmini
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dry-run staging deployment
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry-run staging deployment only."
          echo "Current commit: ${GITHUB_SHA}"
          bash scripts/deploy-staging.sh --ref "${{ github.sha }}"
          echo "No staging deployment was performed."
          echo "No services will be restarted."
          echo "No secrets or environment files will be read."
          echo "No database migrations will be run."
          echo "No production or staging runtime will be modified."
          echo "Required future gates:"
          echo "- Define staging runtime path."
          echo "- Define staging environment strategy."
          echo "- Add staging smoke tests."
          echo "- Approve execute mode separately after all gates exist."
          exit 0
